[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
# 跳过 integration 测试（需要真实 key）
markers =
    integration: mark test as integration (requires real API keys, skipped in CI)
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
